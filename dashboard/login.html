<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalenCrew — Admin Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }
    .logo span { color: #25D366; }
    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 40px;
    }
    .btn-google {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #1a1d27;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
      font-family: inherit;
    }
    .btn-google:hover { background: #f3f4f6; }
    .error {
      margin-top: 16px;
      font-size: 13px;
      color: #ef4444;
      display: none;
    }
    .loading {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo">Talen<span>Crew</span></div>
  <div class="subtitle">Admin Dashboard · Acceso restringido</div>

  <button class="btn-google" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continuar con Google
  </button>

  <div class="error" id="errorMsg">Acceso denegado. Solo administradores autorizados.</div>
  <div class="loading" id="loadingMsg">Verificando acceso...</div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const ALLOWED_EMAILS = ['seacrewagency@gmail.com'];

  const app = initializeApp({
    apiKey: "AIzaSyD-WlfKXja9SvWqhArUHkkJdn5JXQLxohg",
    authDomain: "gen-lang-client-0598503352.firebaseapp.com",
    projectId: "gen-lang-client-0598503352",
    storageBucket: "gen-lang-client-0598503352.firebasestorage.app",
    messagingSenderId: "869550093470",
    appId: "1:869550093470:web:7bb6989d149af7038db78f"
  });

  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  onAuthStateChanged(auth, (user) => {
    if (user && ALLOWED_EMAILS.includes(user.email)) {
      window.location.href = 'admin.html';
    }
  });

  window.signInWithGoogle = async () => {
    document.getElementById('loadingMsg').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      if (!ALLOWED_EMAILS.includes(user.email)) {
        await auth.signOut();
        document.getElementById('errorMsg').style.display = 'block';
      }
    } catch (err) {
      console.error(err);
    } finally {
      document.getElementById('loadingMsg').style.display = 'none';
    }
  };
</script>

</body>
</html>
