<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeloiApp — Bots de WhatsApp con IA</title>
<meta name="description" content="Agenda una demo gratis, escríbenos por WhatsApp o conoce VeloiApp.">
<style>
  :root{
    --emerald-deep:#083F2E;
    --emerald:#0E7A57;
    --mint:#4CEBB0;
    --mint-soft:#2FCB93;
    --spark:#FFB648;
    --paper:#F6FAF7;
    --ink:#06231C;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(circle at 20% -10%, rgba(76,235,176,0.18), transparent 45%),
      radial-gradient(circle at 100% 10%, rgba(255,182,72,0.10), transparent 40%),
      linear-gradient(160deg, var(--emerald) 0%, var(--emerald-deep) 65%, #041F17 100%);
    color:var(--paper);
    display:flex;
    justify-content:center;
    padding:56px 20px 40px;
  }
  .wrap{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* logo mark */
  .mark{
    width:84px; height:84px;
    border-radius:22px;
    background:linear-gradient(135deg,#0E7A57,#083F2E);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    margin-bottom:20px;
  }
  .mark svg{width:52px; height:52px;}

  h1{
    font-size:26px;
    font-weight:800;
    letter-spacing:-0.5px;
    text-align:center;
  }
  h1 span{color:var(--mint);}

  .tagline{
    margin-top:8px;
    font-size:14.5px;
    color:#BFE9D8;
    text-align:center;
    line-height:1.5;
    max-width:300px;
  }

  .links{
    width:100%;
    margin-top:34px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .btn{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding:18px 20px;
    border-radius:16px;
    text-decoration:none;
    font-weight:700;
    font-size:16px;
    transition:transform .15s ease, filter .15s ease;
  }
  .btn:active{ transform:scale(0.98); }

  .btn-icon{
    width:38px; height:38px;
    border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .btn-icon svg{ width:20px; height:20px; }

  .btn-text{ display:flex; flex-direction:column; gap:2px; }
  .btn-sub{ font-size:12.5px; font-weight:500; opacity:0.75; }

  .btn-primary{
    background:linear-gradient(135deg, var(--mint), var(--mint-soft));
    color:var(--ink);
  }
  .btn-primary .btn-icon{ background:rgba(6,35,28,0.12); }
  .btn-primary:hover{ filter:brightness(1.04); }

  .btn-secondary{
    background:rgba(255,255,255,0.06);
    color:var(--paper);
    border:1px solid rgba(255,255,255,0.14);
    backdrop-filter:blur(6px);
  }
  .btn-secondary .btn-icon{ background:rgba(255,255,255,0.10); }
  .btn-secondary:hover{ background:rgba(255,255,255,0.10); }

  .btn-spark .btn-icon{ background:rgba(255,182,72,0.18); }

  footer{
    margin-top:44px;
    text-align:center;
    font-size:12px;
    color:rgba(246,250,247,0.45);
    letter-spacing:0.3px;
  }
  footer a{ color:rgba(246,250,247,0.6); }
</style>
</head>
<body>
  <div class="wrap">

    <div class="mark">
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <rect x="108" y="158" width="222" height="160" rx="54" fill="#4CEBB0"/>
        <path d="M 148 300 Q 140 330 118 344 Q 152 340 172 316 Z" fill="#2FCB93"/>
        <path d="M 350 200 L 396 238 L 350 276" fill="none" stroke="#4CEBB0" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 392 214 L 424 238 L 392 262" fill="none" stroke="#4CEBB0" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
        <g transform="translate(300,178)">
          <path d="M0,-22 C2,-8 8,-2 22,0 C8,2 2,8 0,22 C-2,8 -8,2 -22,0 C-8,-2 -2,-8 0,-22 Z" fill="#FFB648"/>
        </g>
      </svg>
    </div>

    <h1>veloi<span>app</span></h1>
    <p class="tagline">Bots de WhatsApp con IA que responden y agendan citas 24/7, sin que se te escape un cliente.</p>

    <div class="links">

      <a class="btn btn-primary" href="https://cal.com/talen-crew-vnposv/15min" target="_blank" rel="noopener">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#06231C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="3"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
            <path d="M9 16l2 2 4-4"/>
          </svg>
        </span>
        <span class="btn-text">
          Agenda tu demo gratis
          <span class="btn-sub">15 minutos · sin costo</span>
        </span>
      </a>

      <a class="btn btn-secondary" href="https://wa.me/573224802976?text=Hola%2C%20quiero%20saber%20m%C3%A1s%20de%20VeloiApp" target="_blank" rel="noopener">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4CEBB0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
        </span>
        <span class="btn-text">
          Escríbenos por WhatsApp
          <span class="btn-sub">Respuesta al instante</span>
        </span>
      </a>

      <a class="btn btn-secondary btn-spark" href="https://veloiapp.com" target="_blank" rel="noopener">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FFB648" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/>
          </svg>
        </span>
        <span class="btn-text">
          Conoce VeloiApp
          <span class="btn-sub">veloiapp.com</span>
        </span>
      </a>

    </div>

    <footer>
      © 2026 VeloiApp · <a href="mailto:hola@veloiapp.com">hola@veloiapp.com</a>
    </footer>

  </div>
</body>
</html>
